<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Louis FUT — ASCENDED MODE</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{margin:0;background:#020409;color:#e8eaf6;font-family:Arial}
header{padding:14px 22px;border-bottom:1px solid #1a2540;display:flex;justify-content:space-between;align-items:center}
header h1 span{color:#00ffd5}
button,input{background:#0b0f1c;border:1px solid #1a2540;color:#e8eaf6;padding:8px 12px;border-radius:6px}
button{cursor:pointer}
.panel{padding:14px}
.stats{display:flex;gap:14px;font-size:13px;color:#6ae3c7}
.list{height:70vh;overflow:auto;border-top:1px solid #1a2540;margin-top:10px}
.row{padding:6px 10px;border-bottom:1px solid #0d1320;display:flex;justify-content:space-between}
.row span{width:20%}
</style>
</head>
<body>
<header>
 <h1>Louis <span>FUT</span> — ASCENDED</h1>
 <div>
  <input id="q" placeholder="Recherche joueur">
  <button onclick="autoSquad()">AUTO-SQUAD IA</button>
 </div>
</header>
<div class="panel">
 <div class="stats" id="stats"></div>
 <div class="list" id="list"></div>
</div>
<script>
// ASCENDED ENGINE 100 000 joueurs
const POS=['ST','LW','RW','CAM','CM','CDM','CB','LB','RB','GK'];
const r=(a,b)=>Math.floor(Math.random()*(b-a+1))+a;
const DB=[];
for(let i=1;i<=100000;i++){
 const ovr=r(60,i<1000?92:88);
 const base=Math.min(99,ovr+r(-6,6));
 DB.push({id:i,name:'PLAYER_'+i,pos:POS[r(0,9)],ovr,pac:base+r(-10,10),sho:base+r(-10,10),dri:base+r(-10,10),phy:base+r(-10,10)});
}
const meta=p=>Math.round((p.pac+p.sho+p.dri+p.phy)/4);
const list=document.getElementById('list');
const stats=document.getElementById('stats');
function render(arr){
 list.innerHTML='';
 const frag=document.createDocumentFragment();
 arr.slice(0,300).forEach(p=>{
  const d=document.createElement('div');
  d.className='row';
  d.innerHTML=`<span>${p.name}</span><span>${p.pos}</span><span>${p.ovr}</span><span>META ${meta(p)}</span>`;
  frag.appendChild(d);
 });
 list.appendChild(frag);
 stats.innerHTML=`JOUEURS: ${arr.length} | AFFICHÉS: ${Math.min(300,arr.length)}`;
}
render(DB);
q.oninput=e=>{
 const v=e.target.value.toLowerCase();
 render(DB.filter(p=>p.name.toLowerCase().includes(v)));
}
function autoSquad(){
 const best=[...DB].sort((a,b)=>meta(b)-meta(a)).slice(0,11);
 alert('AUTO-SQUAD IA FINAL
'+best.map(p=>p.name+' '+p.pos+' META '+meta(p)).join('
'));
}
</script>
</body>
</html>
